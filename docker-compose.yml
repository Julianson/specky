# Specky MCP Server — Docker Compose
# Starts Specky in HTTP mode on port 3200

services:
  specky:
    build: .
    container_name: specky-sdd
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
      - SDD_WORKSPACE=/workspace
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
