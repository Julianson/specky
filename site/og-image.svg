<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="210" stroke="white" stroke-width="1"/>
  </g>

  <!-- Specky S-curve icon -->
  <g transform="translate(100, 160)">
    <!-- Central node -->
    <circle cx="50" cy="155" r="28" fill="#a78bfa" opacity="0.9"/>
    <!-- Top node -->
    <circle cx="90" cy="80" r="16" fill="#c4b5fd" opacity="0.7"/>
    <!-- Bottom node -->
    <circle cx="10" cy="230" r="16" fill="#c4b5fd" opacity="0.7"/>
    <!-- Connections -->
    <line x1="50" y1="127" x2="90" y2="96" stroke="#c4b5fd" stroke-width="2.5" opacity="0.6"/>
    <line x1="50" y1="183" x2="10" y2="214" stroke="#c4b5fd" stroke-width="2.5" opacity="0.6"/>
    <!-- Satellite dots -->
    <circle cx="130" cy="60" r="5" fill="#ddd6fe" opacity="0.5"/>
    <circle cx="120" cy="110" r="4" fill="#ddd6fe" opacity="0.4"/>
    <circle cx="-20" cy="260" r="5" fill="#ddd6fe" opacity="0.5"/>
    <circle cx="-10" cy="200" r="4" fill="#ddd6fe" opacity="0.4"/>
  </g>

  <!-- Title: Specky -->
  <text x="260" y="290" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Specky</text>

  <!-- Tagline -->
  <text x="260" y="340" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#c4b5fd">Agentic Spec-Driven Development</text>

  <!-- Description -->
  <text x="260" y="395" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#e5e7eb" opacity="0.85">Stop vibe coding. Start spec coding.</text>

  <!-- Stats bar -->
  <g transform="translate(260, 440)">
    <rect x="0" y="0" width="700" height="50" rx="8" fill="white" opacity="0.1"/>

    <text x="30" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">53</text>
    <text x="58" y="33" font-family="Inter, sans-serif" font-size="13" fill="#c4b5fd">MCP Tools</text>

    <line x1="160" y1="10" x2="160" y2="40" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="180" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">10</text>
    <text x="205" y="33" font-family="Inter, sans-serif" font-size="13" fill="#c4b5fd">Phases</text>

    <line x1="290" y1="10" x2="290" y2="40" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="310" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">17</text>
    <text x="338" y="33" font-family="Inter, sans-serif" font-size="13" fill="#c4b5fd">Diagrams</text>

    <line x1="430" y1="10" x2="430" y2="40" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="450" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">6</text>
    <text x="465" y="33" font-family="Inter, sans-serif" font-size="13" fill="#c4b5fd">Compliance</text>

    <line x1="570" y1="10" x2="570" y2="40" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="590" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white">MIT</text>
    <text x="630" y="33" font-family="Inter, sans-serif" font-size="13" fill="#c4b5fd">Open Source</text>
  </g>

  <!-- URL -->
  <text x="260" y="550" font-family="monospace" font-size="16" fill="#a78bfa" opacity="0.7">github.com/paulasilvatech/specky</text>
</svg>
