# Specky Configuration — .specky/config.yml
# Place this file in your project root to customize Specky behavior.
# All settings are optional. Omit any setting to use the default.

# Custom templates directory (relative to project root).
# If set, Specky checks here before using built-in templates.
# Create this directory and add any template file (e.g., specification.md)
# to override the built-in version for your project.
# templates_path: .specky/templates

# Default test framework for sdd_generate_tests.
# Options: vitest | jest | playwright | pytest | junit | xunit
default_framework: vitest

# Compliance frameworks to check by default in sdd_compliance_check.
# Options: hipaa | soc2 | gdpr | pci_dss | iso27001 | general
compliance_frameworks: [general]

# Enable audit trail — logs every tool call to .specs/NNN/.audit.jsonl
# Useful for enterprise audit requirements and traceability.
# audit_enabled: true
